[PHP]
upload_max_filesize = 50M
post_max_size = 55M
max_execution_time = 60
memory_limit = 256M
display_errors = Off
log_errors = On
error_log = /var/www/html/storage/logs/php-error.log

[Date]
date.timezone = UTC

[Session]
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
