name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  build-static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          path: flowform

      - name: Checkout website
        uses: actions/checkout@v4
        with:
          repository: Flowformhq/website
          path: website

      - name: Checkout docs
        uses: actions/checkout@v4
        with:
          repository: Flowformhq/flowformhq.github.io
          path: flowformhq.github.io

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build marketing site
        run: |
          cd website
          npm ci
          npm run build

      - name: Build docs site
        run: |
          cd flowformhq.github.io
          npm ci
          npm run docs:build

      - name: Package static files
        run: |
          mkdir -p deploy-artifacts
          cp -r website/dist/* deploy-artifacts/marketing/
          cp -r flowformhq.github.io/docs/.vitepress/dist/* deploy-artifacts/docs/
          tar czf deploy-artifacts.tar.gz -C deploy-artifacts .

      - name: Upload static artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-artifacts
          path: deploy-artifacts.tar.gz

  build-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          path: flowform

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build engine image
        run: |
          cd flowform
          docker build -t flowform-engine:latest .
          docker save flowform-engine:latest | gzip > engine-image.tar.gz

      - name: Upload engine artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-artifact
          path: flowform/engine-image.tar.gz

  deploy:
    needs: [build-static, build-engine]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          path: flowform

      - name: Download static artifacts
        uses: actions/download-artifact@v4
        with:
          name: static-artifacts

      - name: Download engine artifact
        uses: actions/download-artifact@v4
        with:
          name: engine-artifact

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          cat >> ~/.ssh/config << EOF
          Host vps
            HostName ${{ secrets.VPS_HOST }}
            User deployer
            IdentityFile ~/.ssh/vps_key
            StrictHostKeyChecking no
          EOF

      - name: Copy static files to VPS
        run: |
          ssh deployer@${{ secrets.VPS_HOST }} "mkdir -p /opt/AWS/deploy/flowformhq/deploy"
          scp -i ~/.ssh/vps_key deploy-artifacts.tar.gz deployer@${{ secrets.VPS_HOST }}:/tmp/
          ssh deployer@${{ secrets.VPS_HOST }} "cd /opt/AWS/deploy/flowformhq/deploy && tar xzf /tmp/deploy-artifacts.tar.gz"

      - name: Copy engine image to VPS
        run: |
          scp -i ~/.ssh/vps_key engine-image.tar.gz deployer@${{ secrets.VPS_HOST }}:/tmp/
          ssh deployer@${{ secrets.VPS_HOST }} "docker load < /tmp/engine-image.tar.gz"

      - name: Copy compose and configs
        run: |
          scp -i ~/.ssh/vps_key -r flowform/deploy/* deployer@${{ secrets.VPS_HOST }}:/opt/AWS/deploy/flowformhq/deploy/

      - name: Deploy on VPS
        run: |
          ssh deployer@${{ secrets.VPS_HOST }} "cd /opt/AWS/deploy/flowformhq && bash deploy/vps-deploy.sh"

      - name: Health check
        run: |
          sleep 10
          ssh deployer@${{ secrets.VPS_HOST }} "docker ps | grep flowform"
